<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yükleme Planlayıcı — Export Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="./src/assets/css/theme.css" />
  <script>
    (function() {
      const t = localStorage.getItem('ep-theme') || 'light';
      document.documentElement.classList.add(t);
    })();
  </script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    .lp-card{background:var(--surface,#fff);border:1px solid var(--border-soft);border-radius:14px;}
    .lp-stat{background:var(--surface,#fff);border:1px solid var(--border-soft);border-radius:12px;padding:14px 16px;}
    .lp-stat .v{font-size:22px;font-weight:700;color:var(--ink-1);line-height:1.1;}
    .lp-stat .l{font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}
    .lp-bar{height:8px;border-radius:6px;background:var(--border-soft);overflow:hidden;}
    .lp-bar > span{display:block;height:100%;background:var(--accent);transition:width .4s;}
    #lp-canvas{display:block;width:100%;height:100%;border-radius:12px;cursor:grab;}
    #lp-canvas:active{cursor:grabbing;}
    .lp-tip{position:absolute;pointer-events:none;z-index:30;background:var(--ink-1);color:#fff;
      font-size:12px;padding:8px 11px;border-radius:8px;line-height:1.5;max-width:240px;
      box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .12s;}
    .lp-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;
      border-radius:999px;border:1px solid var(--border);background:var(--surface,#fff);
      color:var(--ink-2);cursor:pointer;transition:all .15s;}
    .lp-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .lp-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border-soft);
      border-radius:10px;margin-bottom:6px;background:var(--surface,#fff);}
    .lp-row .nm{font-size:13px;font-weight:600;color:var(--ink-1);flex:1;min-width:0;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .lp-row .meta{font-size:11px;color:var(--ink-2);}
    .lp-qty{width:54px;text-align:center;border:1px solid var(--border);border-radius:8px;
      padding:4px;font-size:13px;background:var(--bg);color:var(--ink-1);}
    .lp-legend{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2);}
    .lp-legend i{width:12px;height:12px;border-radius:3px;display:inline-block;}
  </style>
</head>
<body style="background:var(--bg);color:var(--ink-1);font-family:Verdana,Geneva,sans-serif;">

  <div id="navbar-target"></div>

  <main style="margin-left:230px;padding:32px 36px;min-height:100vh;background:var(--bg);">
    <header style="margin-bottom:22px;">
      <h2 class="page-title">
        <i class="fa-solid fa-truck-ramp-box" style="color:var(--accent);font-size:20px;"></i>
        Yükleme Planlayıcı
      </h2>
      <p style="font-size:13px;color:var(--ink-2);margin-top:4px;">
        Tanımlı paletleri seçin, taşıyıcı aracı belirleyin — 3D yükleme planını otomatik oluşturun.
      </p>
    </header>

    <div id="planner-root"></div>
  </main>

  <script type="module" src="./src/loading-planner.js"></script>
</body>
</html>
