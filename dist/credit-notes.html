<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script>/* Flash önle */ (function(){var t=localStorage.getItem("ep-theme")||"dark";document.documentElement.classList.add(t==="light"?"light":"dark");})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Note Takip - Export Manager Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        input, select, textarea {
            background: rgb(2 6 23); border: 1px solid rgb(51 65 85);
            border-radius: 0.5rem; padding: 0.5rem 1rem;
            color: rgb(241 245 249); font-size: 0.875rem; width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: rgb(99 102 241); box-shadow: 0 0 0 1px rgb(99 102 241); }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
        .modal-backdrop.hidden { display: none; }
        .modal-content { background: rgb(15 23 42); border: 1px solid rgb(30 41 59); border-radius: 1rem; width: 100%; max-width: 56rem; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .custom-table-container { overflow-x: auto; background: rgba(15,23,42,0.4); border: 1px solid rgb(30 41 59); border-radius: 0.75rem; }
        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th { padding: 0.75rem 1rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgb(100 116 139); text-align: left; white-space: nowrap; border-bottom: 1px solid rgb(30 41 59); }
        .custom-table td { padding: 0.75rem 1rem; font-size: 0.875rem; color: rgb(148 163 184); border-bottom: 1px solid rgb(15 23 42); }
        .custom-table tbody tr:hover { background: rgba(30,41,59,0.5); }
        .custom-table tbody tr:last-child td { border-bottom: none; }
    </style>
  <script type="module" crossorigin src="/assets/creditNotes-DmHAih0J.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-BknLIeSq.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-CaRXNSM_.css">
</head>
<body class="bg-slate-950 text-slate-100">

    <div id="navbar-target"></div>

    <main class="ml-64 p-8 min-h-screen">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-5 border-b border-slate-800">
            <div>
                <h2 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                    <i class="fa-solid fa-file-invoice-dollar text-rose-500"></i> Credit Note (Şikayet & Mahsup) Takibi
                </h2>
                <p class="text-sm text-slate-400 mt-1">Müşteri şikayetleri, kalite kararları ve finansal statü takipleri.</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-export-cn" class="px-4 py-2 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-lg text-sm font-semibold flex items-center gap-2 text-slate-300 cursor-pointer">
                    <i class="fa-solid fa-file-excel text-emerald-500"></i> Dışa Aktar
                </button>
                <button id="btn-open-cn-modal" class="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-lg text-sm font-semibold flex items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-circle-plus"></i> Yeni CN Dosyası Aç
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-slate-500 text-sm z-10"></i>
                <input type="text" id="cn-search-input" placeholder="Müşteri adına göre dosya ara..." style="padding-left:2.5rem">
            </div>
            <select id="filter-cn-status">
                <option value="">Tüm Süreç Durumları</option>
                <option value="İncelemede">İncelemede</option>
                <option value="Onaylandı">Onaylandı</option>
                <option value="Reddedildi">Reddedildi</option>
                <option value="Mahsup Edildi">Mahsup Edildi</option>
            </select>
            <div class="bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-2 flex items-center justify-between text-xs text-slate-400 font-medium">
                <span>Açık Şikayet/Dosya:</span>
                <span id="total-cn-records" class="text-rose-400 font-bold text-sm">0 Dosya</span>
            </div>
        </section>

        <section class="custom-table-container">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Belge Tarihi</th>
                        <th>Müşteri / Firma</th>
                        <th>Şikayetli Kalemler</th>
                        <th>Süreç Durumu</th>
                        <th class="text-center">İşlem</th>
                    </tr>
                </thead>
                <tbody id="cn-table-body">
                    <tr><td colspan="5" class="text-center text-slate-500 py-8">Yükleniyor...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal -->
    <div id="cn-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="flex items-center justify-between border-b border-slate-800 p-6">
                <h3 id="cn-modal-title" class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-file-medical text-rose-500"></i> Yeni Credit Note Dosyası
                </h3>
                <button id="btn-close-cn-modal" class="text-slate-500 hover:text-slate-300 cursor-pointer">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <form id="cn-form" class="flex-1 overflow-y-auto p-6 space-y-6">
                <input type="hidden" id="cn-id">

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-900/30 p-4 border border-slate-800 rounded-xl">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Müşteri Firma *</label>
                        <select id="cn-customer-select" required>
                            <option value="">-- Müşteri Seçiniz --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Belge Tarihi *</label>
                        <input type="date" id="cn_date" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Süreç Durumu</label>
                        <select id="process_status">
                            <option value="İncelemede">İncelemede</option>
                            <option value="Onaylandı">Onaylandı</option>
                            <option value="Reddedildi">Reddedildi</option>
                            <option value="Mahsup Edildi">Mahsup Edildi</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                        <h4 class="text-xs font-bold text-indigo-400 uppercase tracking-widest flex items-center gap-2">
                            <i class="fa-solid fa-boxes-stacked"></i> Şikayet Ürün Kalemleri
                        </h4>
                        <button type="button" id="btn-add-item-row" class="text-xs bg-indigo-950 hover:bg-indigo-900 border border-indigo-900 text-indigo-400 px-3 py-1.5 rounded-lg flex items-center gap-1.5 cursor-pointer">
                            <i class="fa-solid fa-plus text-xs"></i> Yeni Satır Ekle
                        </button>
                    </div>
                    <div id="cn-items-container" class="space-y-4"></div>
                </div>
            </form>

            <div class="flex items-center justify-between border-t border-slate-800 p-6 bg-slate-950/60">
                <button type="button" id="btn-delete-cn" class="hidden px-4 py-2 bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900/50 text-rose-400 text-sm font-semibold rounded-lg cursor-pointer">
                    <i class="fa-solid fa-trash-can"></i> Dosyayı Sil
                </button>
                <div class="flex items-center gap-3 ml-auto">
                    <button type="button" id="btn-cn-cancel" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-sm font-semibold text-slate-300 cursor-pointer">İptal / Kapat</button>
                    <button type="submit" form="cn-form" class="px-5 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-lg text-sm font-semibold cursor-pointer">Değişiklikleri Kaydet</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
