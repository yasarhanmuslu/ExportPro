<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script>/* Flash önle */ (function(){var t=localStorage.getItem('ep-theme')||'light';document.documentElement.classList.add(t==='dark'?'dark':'light');})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteriler — Export Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ── Porselen iç sayfa overrides ── */
        body { background: #F6F3EC !important; color: #1C1A17 !important; }
        .modal-backdrop { background: rgba(28,26,23,0.50) !important; backdrop-filter: blur(4px); }
        input, select, textarea {
            background: #fff !important; border: 1px solid #E4DDCE !important;
            border-radius: 6px !important; color: #1C1A17 !important;
            font-family: Verdana, Geneva, sans-serif !important; font-size: 13px !important;
        }
        input:focus, select:focus, textarea:focus {
            outline: none !important; border-color: #2D4A3E !important;
            box-shadow: 0 0 0 3px rgba(45,74,62,0.08) !important;
        }

        input, select, textarea {
            background: #fff; border: 1px solid #E4DDCE;
            border-radius: 6px; padding: 0 12px;
            color: #1C1A17; font-size: 13px; width: 100%; height: 38px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2D4A3E; box-shadow: 0 0 0 3px rgba(45,74,62,0.08); }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(28,26,23,0.5); backdrop-filter: blur(4px); display: flex; align-items: flex-start; justify-content: center; z-index: 100; padding: 1.5rem; overflow-y: auto; }
        .modal-backdrop.hidden { display: none; }
        .modal-content { background: rgb(15 23 42); border: 1px solid rgb(30 41 59); border-radius: 1rem; padding: 1.5rem; width: 100%; max-width: 38rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); margin: auto; }
        .custom-table-container { overflow-x: auto; background: rgba(15,23,42,0.4); border: 1px solid rgb(30 41 59); border-radius: 0.75rem; }
        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th { padding: 0.75rem 1rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgb(100 116 139); text-align: left; white-space: nowrap; border-bottom: 1px solid rgb(30 41 59); }
        .custom-table td { padding: 0.75rem 1rem; font-size: 0.875rem; color: rgb(148 163 184); border-bottom: 1px solid rgb(15 23 42); }
        .custom-table tbody tr:hover { background: rgba(30,41,59,0.5); }
        .custom-table tbody tr:last-child td { border-bottom: none; }
        
        .history-row { display: grid; grid-template-columns: 160px 1fr; gap: 0.5rem; align-items: center; }
        input[type="date"] { color-scheme: dark; }
    </style>
  <script type="module" crossorigin src="/assets/customers-DBO5GoZd.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/navbar-Dg2HCFHJ.js">
  <link rel="modulepreload" crossorigin href="/assets/auth-CaJjsXSj.js">
  <link rel="stylesheet" crossorigin href="/assets/navbar-DgWRtou4.css">
</head>
<body class="min-h-screen">

    <div id="navbar-target"></div>

    <main class="min-h-screen" style="margin-left:230px;padding:32px;">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-5 border-b">
            <div>
                <h2 class="page-title">
                    <i class="fa-solid fa-users text-blue-500"></i> Müşteri Arşivi
                </h2>
                <p class="text-sm text-slate-400 mt-1">Uluslararası müşterilerinizin portföy yönetimi ve segmentasyon.</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-export-excel" class="px-4 py-2 bg-[#FBF8F1] hover:bg-[#F0EDE4F1] border border-slate-700 rounded-lg text-sm font-semibold flex items-center gap-2 text-slate-300 cursor-pointer">
                    <i class="fa-solid fa-file-excel text-emerald-500"></i> Excel'e Aktar
                </button>
                <button id="btn-open-modal" class="px-4 py-2 bg-[#2D4A3E] hover:bg-[#1a3329] text-white rounded-lg text-sm font-semibold flex items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-plus"></i> Yeni Müşteri Ekle
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-slate-500 text-sm z-10"></i>
                <input type="text" id="search-input" placeholder="Firma adı, yetkili veya ülke ara..." style="padding-left:2.5rem">
            </div>
            <select id="filter-country">
                <option value="">Tüm Ülkeler (Filtrele)</option>
            </select>
            <select id="filter-group">
                <option value="">Tüm Gruplar (Filtrele)</option>
                <option value="Standart">Standart</option>
                <option value="VIP">VIP</option>
                <option value="Stratejik">Stratejik</option>
                <option value="Potansiyel">Potansiyel</option>
            </select>
        </section>

        <section id="customers-list-container" class="space-y-4">
            <div class="text-[#968B7A] text-sm py-8 text-center">Yükleniyor...</div>
        </section>
    </main>

    <!-- Modal -->
    <div id="customer-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="flex items-center justify-between border-b pb-4 mb-5">
                <h3 id="modal-title" class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-user-plus text-blue-500"></i> Yeni Müşteri Kaydı
                </h3>
                <button id="btn-close-modal" class="text-[#968B7A] hover:text-slate-300 cursor-pointer">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <form id="customer-form" class="space-y-5">
                <input type="hidden" id="customer-id">

                <!-- BÖLÜM 1: Temel Bilgiler -->
                <div>
                    <div class="form-section-title"><i class="fa-solid fa-building"></i> Firma Bilgileri</div>
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Ülke *</label>
                                <input type="text" id="country" required placeholder="Örn: Almanya">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Firma Adı *</label>
                                <input type="text" id="company_name" required placeholder="Örn: Global Trade GmbH">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Yetkili Ad Soyad</label>
                            <input type="text" id="contact_name" placeholder="Örn: Hans Müller">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">E-Posta</label>
                                <input type="email" id="email" placeholder="info@firma.com">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Telefon</label>
                                <input type="text" id="phone" placeholder="+49 123 456 78">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Web Sitesi</label>
                                <input type="text" id="website" placeholder="www.firma.com">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Müşteri Tipi</label>
                                <select id="client_group">
                                    <option value="Standart">Standart</option>
                                    <option value="VIP">VIP</option>
                                    <option value="Stratejik">Stratejik</option>
                                    <option value="Potansiyel">Potansiyel</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Durum</label>
                            <select id="status">
                                <option value="Aktif">AKTİF</option>
                                <option value="Pasif">PASİF</option>
                                <option value="Potansiyel">POTANSİYEL</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- BÖLÜM 2: Geçmiş / Notlar -->
                <div>
                    <div class="form-section-title"><i class="fa-solid fa-clock-rotate-left"></i> Geçmiş (Tarih &amp; Not)</div>
                    <div class="space-y-2">
                        <div class="history-row">
                            <input type="date" id="history_date_1">
                            <input type="text" id="history_note_1" placeholder="1. Not">
                        </div>
                        <div class="history-row">
                            <input type="date" id="history_date_2">
                            <input type="text" id="history_note_2" placeholder="2. Not">
                        </div>
                        <div class="history-row">
                            <input type="date" id="history_date_3">
                            <input type="text" id="history_note_3" placeholder="3. Not">
                        </div>
                    </div>
                </div>

                <!-- Footer Butonlar -->
                <div class="flex items-center justify-between border-t border-slate-800 pt-5 mt-2">
                    <button type="button" id="btn-delete-customer" class="hidden px-4 py-2 bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900/50 text-[#9F3D3D] text-sm font-semibold rounded-lg cursor-pointer">
                        <i class="fa-solid fa-trash-can"></i> Kaydı Sil
                    </button>
                    <div class="flex items-center gap-3 ml-auto">
                        <button type="button" id="btn-cancel" class="px-4 py-2 bg-[#FBF8F1] hover:bg-[#FBF8F1] border border-slate-700 rounded-lg text-sm font-semibold text-slate-300 cursor-pointer">Vazgeç</button>
                        <button type="submit" class="px-5 py-2 bg-[#2D4A3E] hover:bg-[#1a3329] text-white rounded-lg text-sm font-semibold cursor-pointer">
                            <i class="fa-solid fa-floppy-disk mr-1.5"></i>Kaydet
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
