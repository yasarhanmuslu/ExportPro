    <!-- ═══════════════════════════════════════════
         TCMB DÖVİZ KURU SCRIPT
         Kaynak: fawazahmed0/currency-api (CDN, CORS-free, günlük)
         Mantık: TCMB çalışma saati 09:30-17:30 hft içi.
                 Kapalı/tatil ise son iş günü kurunu göster.
    ════════════════════════════════════════════ -->
    <script type="module">
    (async function loadFxRates() {
        const usdEl    = document.getElementById('fx-usd-val');
        const eurEl    = document.getElementById('fx-eur-val');
        const statusEl = document.getElementById('fx-status');
        const dotEl    = document.getElementById('fx-dot');

        // Türkiye sabit resmi tatilleri (MM-DD)
        const HOLIDAYS = ['01-01','04-23','05-01','05-19','07-15','08-30','10-29'];

        function toMMDD(d) {
            return String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }

        function toISO(d) {
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }

        // Bir önceki iş gününü bul (geriye giderek)
        function prevBusinessDay(d) {
            const x = new Date(d);
            do { x.setDate(x.getDate() - 1); }
            while (x.getDay() === 0 || x.getDay() === 6 || HOLIDAYS.includes(toMMDD(x)));
            return x;
        }

        // Bugün iş günü mü?
        function isBusinessDay(d) {
            return d.getDay() !== 0 && d.getDay() !== 6 && !HOLIDAYS.includes(toMMDD(d));
        }

        // TCMB piyasa açık mı? (09:30 – 17:30 hft içi)
        function isTcmbOpen(d) {
            if (!isBusinessDay(d)) return false;
            const h = d.getHours(), m = d.getMinutes();
            const mins = h * 60 + m;
            return mins >= 9 * 60 + 30 && mins < 17 * 60 + 30;
        }

        async function fetchRates(dateISO) {
            const url = `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${dateISO}/v1/currencies/try.json`;
            const r = await fetch(url);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const data = await r.json();
            // API: 1 TRY = X birim → ters çevir → 1 birim = ? TRY
            return {
                usd: (1 / data.try.usd).toFixed(4),
                eur: (1 / data.try.eur).toFixed(4)
            };
        }

        function fmt(val) {
            return parseFloat(val).toLocaleString('tr-TR', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
        }

        const now   = new Date();
        const open  = isTcmbOpen(now);
        const today = isBusinessDay(now);

        // Hangi tarihin verisini çekeceğiz?
        // - Piyasa açıksa → bugün
        // - Bugün iş günü ama mesai dışıysa → bugün (günün kapanış kuru)
        // - Tatil/hafta sonu → önceki iş günü
        let targetDate = today ? toISO(now) : toISO(prevBusinessDay(now));
        let rates = null;

        try {
            rates = await fetchRates(targetDate);
        } catch {
            // Fallback: bir önceki iş günü
            try {
                const fallback = today ? prevBusinessDay(now) : prevBusinessDay(new Date(targetDate));
                targetDate = toISO(fallback);
                rates = await fetchRates(targetDate);
            } catch {
                usdEl.textContent = 'N/A';
                eurEl.textContent = 'N/A';
                statusEl.textContent = 'Veri alınamadı';
                usdEl.classList.remove('fx-loading');
                eurEl.classList.remove('fx-loading');
                return;
            }
        }

        // Değerleri göster
        usdEl.textContent = fmt(rates.usd);
        eurEl.textContent = fmt(rates.eur);
        usdEl.classList.remove('fx-loading');
        eurEl.classList.remove('fx-loading');

        // Durum etiketi
        if (open) {
            dotEl.className = 'fx-dot-open';
            statusEl.textContent = 'Canlı · ' + now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        } else {
            dotEl.className = 'fx-dot-close';
            const d = new Date(targetDate + 'T12:00:00'); // noon — saat dilimi kaymasını önle
            const label = d.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            statusEl.textContent = 'Son Kur · ' + label;
        }
    })();
    </script>
