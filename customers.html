<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script>/* Flash önle */ (function(){var t=localStorage.getItem('ep-theme')||'light';document.documentElement.classList.add(t==='dark'?'dark':'light');})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteriler — Export Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <link rel="stylesheet" href="./src/assets/css/theme.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ════════════════════════════════════════════
           AÇIK TEMA — İdevit / Pomelli (Ürün Kartları ile uyumlu)
           Tüm renkler theme.css değişkenleri üzerinden → koyu/açık tema toggle çalışır.
           Fallback değerleri navbar ile birebir aynıdır.
           ════════════════════════════════════════════ */
        :root {
            --porc-bg:      var(--surface-2, #F6F3EC);
            --porc-surface: var(--surface,   #FBF8F1);
            --porc-border:  var(--border,    #E4DDCE);
            --porc-ink:     var(--ink-1,     #1C1A17);
            --porc-ink-2:   var(--ink-2,     #6B655B);
            --porc-ink-3:   var(--ink-3,     #968B7A);
            --porc-accent:  #2D4A3E;   /* marka koyu yeşili — birincil aksiyon */
        }

        body { background: var(--porc-bg) !important; color: var(--porc-ink) !important; }

        /* ── Form elemanları (açık zemin) ── */
        input, select, textarea {
            background: var(--surface, #fff) !important; border: 1px solid var(--porc-border) !important;
            border-radius: 6px !important; padding: 0 12px;
            color: var(--porc-ink) !important;
            font-family: Verdana, Geneva, sans-serif !important; font-size: 13px !important;
            width: 100%; height: 38px;
        }
        input::placeholder, textarea::placeholder { color: var(--porc-ink-3); opacity: 1; }
        input:focus, select:focus, textarea:focus {
            outline: none !important; border-color: var(--porc-accent) !important;
            box-shadow: 0 0 0 3px rgba(45,74,62,0.10) !important;
        }
        input[type="date"] { color-scheme: light; }

        /* ── Modal (açık yüzey) ── */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(28,26,23,0.45) !important; backdrop-filter: blur(4px);
            display: flex; align-items: flex-start; justify-content: center;
            z-index: 100; padding: 1.5rem; overflow-y: auto;
        }
        .modal-backdrop.hidden { display: none; }
        .modal-content {
            background: var(--porc-surface); border: 1px solid var(--porc-border);
            border-radius: 1rem; padding: 1.5rem; width: 100%; max-width: 40rem;
            box-shadow: 0 24px 50px -12px rgba(28,26,23,0.18); margin: auto;
            color: var(--porc-ink);
        }

        /* ── Tablo (açık) ── */
        .custom-table-container {
            overflow-x: auto; background: var(--surface, #fff);
            border: 1px solid var(--porc-border); border-radius: 0.75rem;
        }
        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th {
            padding: 0.75rem 1rem; font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--porc-ink-3); text-align: left; white-space: nowrap;
            background: var(--porc-surface);
            border-bottom: 1px solid var(--porc-border);
        }
        .custom-table td {
            padding: 0.75rem 1rem; font-size: 0.875rem;
            color: var(--porc-ink-2); border-bottom: 1px solid var(--porc-border);
        }
        .custom-table tbody tr:hover { background: var(--porc-surface); }
        .custom-table tbody tr:last-child td { border-bottom: none; }
        /* Hücre vurgu yardımcıları */
        .cell-strong { color: var(--porc-ink) !important; font-weight: 600; }
        .cell-muted  { color: var(--porc-ink-3) !important; }

        /* ── Sekmeler ── */
        .tab-btn {
            padding: 0.6rem 1rem; font-size: 0.8rem; font-weight: 600;
            color: var(--porc-ink-3); border-bottom: 2px solid transparent;
            cursor: pointer; transition: all .15s; white-space: nowrap;
        }
        .tab-btn:hover { color: var(--porc-ink); }
        .tab-btn.tab-active { color: var(--porc-accent); border-bottom-color: var(--porc-accent); }
        .tab-panel { display: none; }
        .tab-panel.tab-panel-active { display: block; }

        /* ── Bölüm başlığı ── */
        .form-section-title {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--porc-ink-2);
            margin-bottom: 0.75rem; padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--porc-border);
        }
        .form-section-title i { color: var(--porc-accent); }

        /* ── Geçmiş notlar textarea (yapı korundu) ── */
        .history-row { display: grid; grid-template-columns: 160px 1fr 40px; gap: 0.5rem; align-items: start; }
        .history-row input[type="date"] { height: 38px; }
        .history-row textarea {
            height: auto; min-height: 58px; max-height: 160px;
            padding: 9px 12px; resize: vertical; line-height: 1.4;
            overflow-y: auto !important;
        }
        .btn-remove-note {
            height: 38px; display:flex; align-items:center; justify-content:center;
            border:1px solid var(--porc-border); border-radius:6px; color: var(--danger, #9F3D3D);
            background: var(--porc-surface); cursor:pointer; transition: all .15s;
        }
        .btn-remove-note:hover { background:#FCEAEA; border-color:#E8C9C9; }

        /* ── Etiketler ── */
        .page-title { color: var(--porc-ink) !important; }
        #modal-title { color: var(--porc-ink) !important; }
        .lbl-page {
            display:block; font-size:0.75rem; font-weight:600;
            color: var(--porc-ink); margin-bottom:0.375rem;
        }
        .lbl {
            display:block; font-size:0.7rem; font-weight:600; text-transform:uppercase;
            letter-spacing:0.05em; color: var(--porc-ink-2); margin-bottom:0.375rem;
        }
        .lbl-required { color: var(--danger, #9F3D3D); font-weight: 700; }
    </style>
</head>
<body class="min-h-screen">

    <div id="navbar-target"></div>

    <main class="min-h-screen" style="margin-left:230px;padding:32px;">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-5" style="border-bottom:1px solid var(--porc-border);">
            <div>
                <h2 class="page-title text-2xl font-bold">
                    <i class="fa-solid fa-users" style="color:var(--porc-accent);"></i> Müşteri Arşivi
                </h2>
                <p class="text-sm mt-1" style="color:var(--porc-ink-2);">Uluslararası müşterilerinizin portföy yönetimi ve segmentasyon.</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-export-excel" class="px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 cursor-pointer" style="background:var(--porc-surface);border:1px solid var(--porc-border);color:var(--porc-ink-2);">
                    <i class="fa-solid fa-file-excel text-emerald-600"></i> Excel'e Aktar
                </button>
                <label id="btn-import-excel" class="px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 cursor-pointer" style="background:var(--porc-surface);border:1px solid var(--porc-border);color:var(--porc-ink-2);">
                    <i class="fa-solid fa-file-import text-blue-600"></i> İçe Aktar
                    <input type="file" id="import-file-input" accept=".csv,.xlsx,.xls" class="hidden" style="height:auto;">
                </label>
                <button id="btn-open-modal" class="px-4 py-2 text-white rounded-lg text-sm font-semibold flex items-center gap-2 cursor-pointer" style="background:var(--porc-accent);">
                    <i class="fa-solid fa-plus"></i> Yeni Müşteri Ekle
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-6 gap-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-sm z-10 pointer-events-none" style="color:var(--porc-ink-2);"></i>
                <input type="text" id="search-input" placeholder="Firma, yetkili veya ülke ara..." style="padding-left:2.25rem !important">
            </div>
            <select id="filter-region">
                <option value="">Tüm Bölgeler (Filtrele)</option>
                <option value="Avrupa">🌍 Avrupa</option>
                <option value="Orta Doğu">🕌 Orta Doğu</option>
                <option value="Afrika">🌍 Afrika</option>
                <option value="Asya">🌏 Asya</option>
            </select>
            <select id="filter-country">
                <option value="">Tüm Ülkeler (Filtrele)</option>
            </select>
            <select id="filter-group">
                <option value="">Tüm Gruplar (Filtrele)</option>
                <option value="Distribütör">Distribütör</option>
                <option value="Toptancı">Toptancı</option>
                <option value="Bayi">Bayi</option>
                <option value="Perakendeci">Perakendeci</option>
                <option value="Projeci">Projeci</option>
                <option value="Üretici">Üretici</option>
                <option value="OEM">OEM</option>
            </select>
            <select id="filter-status">
                <option value="">Tüm Durumlar (Filtrele)</option>
                <option value="Aktif">Aktif</option>
                <option value="Pasif">Pasif</option>
                <option value="Potansiyel">Potansiyel</option>
                <option value="Kara Liste">Kara Liste</option>
            </select>
            <select id="filter-owner">
                <option value="">Tüm Sorumlular (Filtrele)</option>
            </select>
        </section>

        <section id="customers-list-container" class="space-y-4">
            <div class="text-sm py-8 text-center" style="color:var(--porc-ink-2);">Yükleniyor...</div>
        </section>
    </main>

    <!-- ════════════ MODAL ════════════ -->
    <div id="customer-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="flex items-center justify-between border-b pb-4 mb-4" style="border-color:var(--porc-border);">
                <h3 id="modal-title" class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-user-plus" style="color:var(--porc-accent);"></i> Yeni Müşteri Kaydı
                </h3>
                <button id="btn-close-modal" class="cursor-pointer" style="color:var(--porc-ink-3);">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- Sekme başlıkları -->
            <div class="flex items-center gap-1 border-b mb-5" style="border-color:var(--porc-border);">
                <div class="tab-btn tab-active" data-tab="tab-general"><i class="fa-solid fa-building mr-1.5"></i>Genel Bilgiler</div>
                <div class="tab-btn" data-tab="tab-commercial"><i class="fa-solid fa-file-invoice-dollar mr-1.5"></i>Ticari &amp; Risk</div>
                <div class="tab-btn" data-tab="tab-history"><i class="fa-solid fa-clock-rotate-left mr-1.5"></i>Geçmiş Notlar</div>
            </div>

            <form id="customer-form" class="space-y-5">
                <input type="hidden" id="customer-id">

                <!-- ═══ SEKME 1: GENEL BİLGİLER ═══ -->
                <div id="tab-general" class="tab-panel tab-panel-active space-y-5">
                    <!-- Firma -->
                    <div>
                        <div class="form-section-title"><i class="fa-solid fa-building"></i> Firma Bilgileri</div>
                        <div class="space-y-3">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">Ülke <span class="lbl-required">(ZORUNLU)</span></label>
                                    <input type="text" id="country" required placeholder="Örn: Almanya">
                                </div>
                                <div>
                                    <label class="lbl">Firma Adı <span class="lbl-required">(ZORUNLU)</span></label>
                                    <input type="text" id="company_name" required placeholder="Örn: Global Trade GmbH">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">Müşteri Tipi</label>
                                    <select id="client_group" required>
                                        <option value="Distribütör">Distribütör</option>
                                        <option value="Toptancı">Toptancı</option>
                                        <option value="Bayi">Bayi</option>
                                        <option value="Perakendeci">Perakendeci</option>
                                        <option value="Projeci">Projeci</option>
                                        <option value="Üretici">Üretici</option>
                                        <option value="OEM">OEM</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="lbl">Durum <span class="lbl-required">(ZORUNLU)</span></label>
                                    <select id="status" required>
                                        <option value="Aktif">AKTİF</option>
                                        <option value="Pasif">PASİF</option>
                                        <option value="Potansiyel">POTANSİYEL</option>
                                        <option value="Kara Liste">KARA LİSTE</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">Web Sitesi</label>
                                    <input type="text" id="website" placeholder="www.firma.com">
                                </div>
                                <div>
                                    <label class="lbl">Bölge (Otomatik)</label>
                                    <input type="text" id="region" readonly placeholder="Ülkeye göre otomatik" style="background:var(--porc-surface) !important;color:var(--porc-ink-3) !important;cursor:not-allowed;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 1. Yetkili -->
                    <div>
                        <div class="form-section-title"><i class="fa-solid fa-user-tie"></i> 1. Yetkili</div>
                        <div class="space-y-3">
                            <div>
                                <label class="lbl">Yetkili Ad Soyad</label>
                                <input type="text" id="contact_name" placeholder="Örn: Hans Müller">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">E-Posta</label>
                                    <input type="email" id="email" placeholder="info@firma.com">
                                </div>
                                <div>
                                    <label class="lbl">Telefon</label>
                                    <input type="text" id="phone" placeholder="+49 123 456 78">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 2. Yetkili -->
                    <div>
                        <div class="form-section-title"><i class="fa-solid fa-user-group"></i> 2. Yetkili</div>
                        <div class="space-y-3">
                            <div>
                                <label class="lbl">Yetkili Ad Soyad 2</label>
                                <input type="text" id="contact_name_2" placeholder="Örn: Anna Schmidt">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">E-Posta 2</label>
                                    <input type="email" id="email_2" placeholder="satis@firma.com">
                                </div>
                                <div>
                                    <label class="lbl">Telefon 2</label>
                                    <input type="text" id="phone_2" placeholder="+49 123 456 79">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ═══ SEKME 2: TİCARİ & RİSK ═══ -->
                <div id="tab-commercial" class="tab-panel space-y-5">
                    <!-- Ticari -->
                    <div>
                        <div class="form-section-title"><i class="fa-solid fa-file-invoice-dollar"></i> Ticari Bilgiler <span style="color:#9F3D3D;font-weight:600;">(Zorunlu)</span></div>
                        <div class="space-y-3">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">Para Birimi <span class="lbl-required">(ZORUNLU)</span></label>
                                    <select id="currency" required>
                                        <option value="">— Belirtilmedi —</option>
                                        <option value="EUR">EUR (€)</option>
                                        <option value="USD">USD ($)</option>
                                        <option value="TRY">TRY (₺)</option>
                                        <option value="GBP">GBP (£)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="lbl">Teslim Şekli (Incoterms) <span class="lbl-required">(ZORUNLU)</span></label>
                                    <select id="incoterms" required>
                                        <option value="">— Belirtilmedi —</option>
                                        <option value="EXW">EXW — Exworks</option>
                                        <option value="FCA">FCA — Free carrier</option>
                                        <option value="FAS">FAS — Free alongside ship</option>
                                        <option value="FOB">FOB — Free on board</option>
                                        <option value="CFR">CFR — Cost and freight</option>
                                        <option value="CIF">CIF — Cost, insurance, freight</option>
                                        <option value="CPT">CPT — Carriage paid to</option>
                                        <option value="CIP">CIP — Carriage &amp; insurance paid</option>
                                        <option value="DAP">DAP — Delivered at place</option>
                                        <option value="DPU">DPU — Delivered at place unloaded</option>
                                        <option value="DDP">DDP — Delivered duty paid</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">Ödeme Koşulu <span class="lbl-required">(ZORUNLU)</span></label>
                                    <select id="payment_term" required>
                                        <option value="Peşin">Peşin</option>
                                        <option value="Akreditif (LC)">Akreditif (LC)</option>
                                        <option value="Vesaik (CAD)">Vesaik (CAD)</option>
                                        <option value="Mal Mukabili">Mal Mukabili</option>
                                        <option value="Avans + Bakiye">Avans + Bakiye</option>
                                        <option value="Vadeli (30 gün)">Vadeli (30 gün)</option>
                                        <option value="Vadeli (60 gün)">Vadeli (60 gün)</option>
                                        <option value="Vadeli (90 gün)">Vadeli (90 gün)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="lbl">Edinme Kaynağı</label>
                                    <select id="acquisition_source" required>
                                        <option value="Fuar">Fuar</option>
                                        <option value="Web Sitesi">Web Sitesi</option>
                                        <option value="Referans">Referans</option>
                                        <option value="Pazar Araştırması">Pazar Araştırması</option>
                                        <option value="Sosyal Medya">Sosyal Medya</option>
                                        <option value="Ticaret Müşaviri">Ticaret Müşaviri</option>
                                        <option value="Diğer" selected>Diğer</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">Müşteri Sorumlusu</label>
                                    <input type="text" id="account_owner" required placeholder="Örn: Ahmet Yılmaz">
                                </div>
                                <div>
                                    <label class="lbl">Vergi / VAT No</label>
                                    <input type="text" id="vat_number" placeholder="Örn: DE123456789">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Segmentasyon & Risk -->
                    <div>
                        <div class="form-section-title"><i class="fa-solid fa-chart-pie"></i> Segmentasyon &amp; Risk</div>
                        <div class="space-y-3">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">İletişim Dili</label>
                                    <select id="language">
                                        <option value="">— Seçiniz —</option>
                                        <option value="İngilizce">İngilizce</option>
                                        <option value="Almanca">Almanca</option>
                                        <option value="Fransızca">Fransızca</option>
                                        <option value="Arapça">Arapça</option>
                                        <option value="Rusça">Rusça</option>
                                        <option value="İspanyolca">İspanyolca</option>
                                        <option value="Türkçe">Türkçe</option>
                                        <option value="Diğer">Diğer</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="lbl">Risk Skoru (1-5)</label>
                                    <select id="risk_score">
                                        <option value="">— Belirtilmedi —</option>
                                        <option value="1">1 — Çok Düşük</option>
                                        <option value="2">2 — Düşük</option>
                                        <option value="3">3 — Orta</option>
                                        <option value="4">4 — Yüksek</option>
                                        <option value="5">5 — Çok Yüksek</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">Kredi Limiti</label>
                                    <input type="number" id="credit_limit" min="0" step="0.01" placeholder="0">
                                </div>
                                <div>
                                    <label class="lbl">Yıllık Hedef Hacim</label>
                                    <input type="number" id="annual_volume_target" min="0" step="0.01" placeholder="0">
                                </div>
                            </div>
                            <div>
                                <label class="lbl">İlgilenilen Ürün Grupları</label>
                                <input type="text" id="product_interests" placeholder="Örn: Klozet, Lavabo, Banyo Mobilyası, Batarya">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="lbl">İlk İşlem Tarihi</label>
                                    <input type="date" id="first_order_date">
                                </div>
                                <div>
                                    <label class="lbl">Son İşlem Tarihi</label>
                                    <input type="date" id="last_order_date">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Kısa Bilgi -->
                    <div>
                        <div class="form-section-title"><i class="fa-solid fa-circle-info"></i> Kısa Bilgi</div>
                        <textarea id="short_info" rows="3" placeholder="Örn: 2026 Unicera fuarında tanışıldı." style="height:auto;padding:10px 12px;resize:vertical;"></textarea>
                    </div>
                </div>

                <!-- ═══ SEKME 3: GEÇMİŞ NOTLAR ═══ -->
                <div id="tab-history" class="tab-panel space-y-3">
                    <div class="form-section-title"><i class="fa-solid fa-clock-rotate-left"></i> Geçmiş (Tarih &amp; Not)</div>
                    <div id="history-rows" class="space-y-2"></div>
                    <button type="button" id="btn-add-note" class="mt-2 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 cursor-pointer" style="background:var(--porc-surface);border:1px solid var(--porc-border);color:var(--porc-accent);">
                        <i class="fa-solid fa-plus"></i> Yeni Not Ekle
                    </button>
                </div>

                <!-- Footer Butonlar -->
                <div class="flex items-center justify-between border-t pt-5 mt-2" style="border-color:var(--porc-border);">
                    <button type="button" id="btn-delete-customer" class="hidden px-4 py-2 text-sm font-semibold rounded-lg cursor-pointer" style="background:#FCEAEA;border:1px solid #E8C9C9;color:var(--danger,#9F3D3D);">
                        <i class="fa-solid fa-trash-can"></i> Kaydı Sil
                    </button>
                    <div class="flex items-center gap-3 ml-auto">
                        <button type="button" id="btn-cancel" class="px-4 py-2 rounded-lg text-sm font-semibold cursor-pointer" style="background:var(--porc-surface);border:1px solid var(--porc-border);color:var(--porc-ink-2);">Vazgeç</button>
                        <button type="submit" class="px-5 py-2 text-white rounded-lg text-sm font-semibold cursor-pointer" style="background:var(--porc-accent);">
                            <i class="fa-solid fa-floppy-disk mr-1.5"></i>Kaydet
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Excel import için SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="module" src="./src/customers.js"></script>
</body>
</html>
