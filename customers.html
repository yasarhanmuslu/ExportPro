<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Manager Pro - Müşteri Arşivi</title>
    <link rel="stylesheet" href="/src/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100">

    <div id="navbar-target"></div>

    <main class="ml-64 p-8 min-h-screen">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-5 border-b border-slate-800">
            <div>
                <h2 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                    <i class="fa-solid fa-users text-blue-500"></i> Müşteri Arşivi
                </h2>
                <p class="text-sm text-slate-400 mt-1">Uluslararası müşterilerinizin portföy yönetimi, segmentasyon ve pazar kırılımları.</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="btn-export-excel" class="px-4 py-2 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-lg text-sm font-semibold flex items-center gap-2 text-slate-300">
                    <i class="fa-solid fa-file-excel text-emerald-500"></i> Excel'e Aktar
                </button>
                <button id="btn-open-modal" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-semibold flex items-center gap-2 shadow-lg shadow-blue-600/20">
                    <i class="fa-solid fa-plus"></i> Yeni Müşteri Ekle
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-slate-500 text-sm"></i>
                <input type="text" id="search-input" placeholder="Firma adı veya ülke ara..." class="w-full pl-10">
            </div>
            <div>
                <select id="filter-country" class="w-full">
                    <option value="">Tüm Ülkeler (Filtrele)</option>
                </select>
            </div>
            <div>
                <select id="filter-group" class="w-full">
                    <option value="">Tüm Gruplar (Filtrele)</option>
                    <option value="Standart">Standart</option>
                    <option value="VIP">VIP</option>
                    <option value="Stratejik">Stratejik</option>
                    <option value="Potansiyel">Potansiyel</option>
                </select>
            </div>
        </section>

        <section id="customers-list-container" class="space-y-4">
            <div class="text-slate-500 text-sm py-8 text-center animate-pulse">Müşteri verileri yükleniyor...</div>
        </section>

    </main>

    <div id="customer-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
                <h3 id="modal-title" class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-user-plus text-blue-500"></i> Yeni Müşteri Kaydı
                </h3>
                <button id="btn-close-modal" class="text-slate-500 hover:text-slate-300 transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <form id="customer-form" class="space-y-5">
                <input type="hidden" id="customer-id">

                <div>
                    <label for="company_name" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Firma Adı (Resmi Ünvan) <span class="text-rose-500">*</span></label>
                    <input type="text" id="company_name" required placeholder="Örn: Global Trade GmbH" class="w-full">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="country" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Ülke <span class="text-rose-500">*</span></label>
                        <input type="text" id="country" required placeholder="Örn: Almanya" class="w-full">
                    </div>
                    <div>
                        <label for="client_group" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Müşteri Grubu / Segmenti</label>
                        <select id="client_group" class="w-full">
                            <option value="Standart">Standart</option>
                            <option value="VIP">VIP</option>
                            <option value="Stratejik">Stratejik</option>
                            <option value="Potansiyel">Potansiyel</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center justify-between border-t border-slate-800 pt-5 mt-6">
                    <button type="button" id="btn-delete-customer" class="px-4 py-2 bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900/50 hover:border-rose-700 text-rose-400 text-sm font-semibold rounded-lg hidden flex items-center gap-2">
                        <i class="fa-solid fa-trash-can"></i> Kaydı Sil
                    </button>
                    <div class="flex items-center gap-3 ml-auto">
                        <button type="button" id="btn-cancel" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-sm font-semibold text-slate-300">Vazgeç</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-semibold shadow-lg shadow-blue-600/20">Kaydet</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/src/customers.js"></script>
</body>
</html>
