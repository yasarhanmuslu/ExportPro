<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Takip - Export Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        input, select, textarea {
            background: rgb(2 6 23); border: 1px solid rgb(51 65 85);
            border-radius: 0.5rem; padding: 0.5rem 1rem;
            color: rgb(241 245 249); font-size: 0.875rem; width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: rgb(99 102 241); box-shadow: 0 0 0 1px rgb(99 102 241); }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
        .modal-backdrop.hidden { display: none; }
        .modal-content { background: rgb(15 23 42); border: 1px solid rgb(30 41 59); border-radius: 1rem; padding: 1.5rem; width: 100%; max-width: 36rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .custom-table-container { overflow-x: auto; background: rgba(15,23,42,0.4); border: 1px solid rgb(30 41 59); border-radius: 0.75rem; }
        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th { padding: 0.75rem 1rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgb(100 116 139); text-align: left; white-space: nowrap; border-bottom: 1px solid rgb(30 41 59); }
        .custom-table td { padding: 0.75rem 1rem; font-size: 0.875rem; color: rgb(148 163 184); border-bottom: 1px solid rgb(15 23 42); }
        .custom-table tbody tr:hover { background: rgba(30,41,59,0.5); }
        .custom-table tbody tr:last-child td { border-bottom: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">

    <div id="navbar-target"></div>

    <main class="ml-64 p-8 min-h-screen">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-5 border-b border-slate-800">
            <div>
                <h2 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                    <i class="fa-solid fa-box-open text-orange-500"></i> Sipariş Takip Pro
                </h2>
                <p class="text-sm text-slate-400 mt-1">Sipariş tutarları, tahsil edilen avanslar ve kalan vadeli bakiye süreçlerinin takibi.</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-export-orders" class="px-4 py-2 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-lg text-sm font-semibold flex items-center gap-2 text-slate-300 cursor-pointer">
                    <i class="fa-solid fa-file-excel text-emerald-500"></i> Dışa Aktar
                </button>
                <button id="btn-open-order-modal" class="px-4 py-2 bg-orange-600 hover:bg-orange-500 text-white rounded-lg text-sm font-semibold flex items-center gap-2 shadow-lg cursor-pointer">
                    <i class="fa-solid fa-plus"></i> Yeni Sipariş Gir
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-slate-500 text-sm z-10"></i>
                <input type="text" id="order-search-input" placeholder="Firma adına göre sipariş ara..." style="padding-left:2.5rem">
            </div>
            <select id="filter-order-currency">
                <option value="">Tüm Para Birimleri</option>
                <option value="EUR">EUR (€)</option>
                <option value="USD">USD ($)</option>
                <option value="TRY">TRY (₺)</option>
                <option value="GBP">GBP (£)</option>
            </select>
            <div class="bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-2 flex items-center justify-between text-xs text-slate-400 font-medium">
                <span>Aktif Sipariş Hacmi:</span>
                <span id="total-filtered-count" class="text-orange-400 font-bold text-sm">0 Kayıt</span>
            </div>
        </section>

        <section class="custom-table-container">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Sipariş Tarihi</th>
                        <th>Firma / Müşteri</th>
                        <th class="text-right">Toplam Tutar</th>
                        <th class="text-right">Alınan Avans</th>
                        <th class="text-right">Kalan Bakiye</th>
                        <th class="text-center">İşlem</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <tr><td colspan="6" class="text-center text-slate-500 py-8">Yükleniyor...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal -->
    <div id="order-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
                <h3 id="order-modal-title" class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-cart-plus text-orange-500"></i> Yeni Sipariş Girişi
                </h3>
                <button id="btn-close-order-modal" class="text-slate-500 hover:text-slate-300 cursor-pointer">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <form id="order-form" class="space-y-4">
                <input type="hidden" id="order-id">

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Müşteri / Firma *</label>
                    <select id="order-customer-select" required>
                        <option value="">-- Müşteri Seçiniz --</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Sipariş Tarihi *</label>
                        <input type="date" id="order_date" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Para Birimi *</label>
                        <select id="currency" required>
                            <option value="EUR">EUR (€)</option>
                            <option value="USD">USD ($)</option>
                            <option value="TRY">TRY (₺)</option>
                            <option value="GBP">GBP (£)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Toplam Sipariş Tutarı *</label>
                        <input type="text" id="total_amount" required placeholder="Örn: 15.000,00" style="text-align:right;color:white">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tahsil Edilen Avans</label>
                        <input type="text" id="advance_payment" placeholder="Örn: 3.500,00" style="text-align:right;color:rgb(52 211 153)">
                    </div>
                </div>

                <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl flex justify-between items-center">
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Kalan Vadeli Bakiye:</span>
                    <span id="live-remaining-balance" class="font-mono font-bold text-lg text-amber-400">0,00</span>
                </div>

                <div class="flex items-center justify-between border-t border-slate-800 pt-5 mt-6">
                    <button type="button" id="btn-delete-order" class="hidden px-4 py-2 bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900/50 text-rose-400 text-sm font-semibold rounded-lg cursor-pointer">
                        <i class="fa-solid fa-trash-can"></i> Siparişi Sil
                    </button>
                    <div class="flex items-center gap-3 ml-auto">
                        <button type="button" id="btn-order-cancel" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-sm font-semibold text-slate-300 cursor-pointer">İptal</button>
                        <button type="submit" class="px-4 py-2 bg-orange-600 hover:bg-orange-500 text-white rounded-lg text-sm font-semibold cursor-pointer">Siparişi Kaydet</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./src/orders.js"></script>
</body>
</html>
