<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Manager Pro - Sipariş Takip</title>
    <link rel="stylesheet" href="/src/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100">

    <div id="navbar-target"></div>

    <main class="ml-64 p-8 min-h-screen">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-5 border-b border-slate-800">
            <div>
                <h2 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                    <i class="fa-solid fa-box-open text-orange-500"></i> Sipariş Takip Pro
                </h2>
                <p class="text-sm text-slate-400 mt-1">Sipariş tutarları, tahsil edilen avanslar ve kalan vadeli bakiye süreçlerinin takibi.</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="btn-export-orders" class="px-4 py-2 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-lg text-sm font-semibold flex items-center gap-2 text-slate-300">
                    <i class="fa-solid fa-file-excel text-emerald-500"></i> Siparişleri Dışa Aktar
                </button>
                <button id="btn-open-order-modal" class="px-4 py-2 bg-orange-600 hover:bg-orange-500 text-white rounded-lg text-sm font-semibold flex items-center gap-2 shadow-lg shadow-orange-600/20">
                    <i class="fa-solid fa-plus"></i> Yeni Sipariş Gir
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-slate-500 text-sm"></i>
                <input type="text" id="order-search-input" placeholder="Firma adına göre sipariş ara..." class="w-full pl-10">
            </div>
            <div>
                <select id="filter-order-currency" class="w-full">
                    <option value="">Tüm Para Birimleri (Filtrele)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="USD">USD ($)</option>
                    <option value="TRY">TRY (₺)</option>
                    <option value="GBP">GBP (£)</option>
                </select>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-2 flex items-center justify-between text-xs text-slate-400 font-medium">
                <span>Aktif Sipariş Hacmi:</span>
                <span id="total-filtered-count" class="text-orange-400 font-bold text-sm">0 Kayıt</span>
            </div>
        </section>

        <section class="custom-table-container">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Sipariş Tarihi</th>
                        <th>Firma / Müşteri</th>
                        <th class="text-right">Toplam Tutar</th>
                        <th class="text-right">Alınan Avans</th>
                        <th class="text-right">Kalan Bakiye</th>
                        <th class="text-center">İşlem</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <tr>
                        <td colspan="6" class="text-center text-slate-500 py-8 animate-pulse">Sipariş verileri yükleniyor...</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <div id="order-modal" class="modal-backdrop hidden">
        <div class="modal-content max-w-xl">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
                <h3 id="order-modal-title" class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-cart-plus text-orange-500"></i> Yeni Sipariş Girişi
                </h3>
                <button id="btn-close-order-modal" class="text-slate-500 hover:text-slate-300 transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <form id="order-form" class="space-y-4">
                <input type="hidden" id="order-id">

                <div>
                    <label for="order-customer-select" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Müşteri / Firma <span class="text-rose-500">*</span></label>
                    <select id="order-customer-select" required class="w-full bg-slate-950">
                        <option value="">-- Müşteri Seçiniz --</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="order_date" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Sipariş Tarihi <span class="text-rose-500">*</span></label>
                        <input type="date" id="order_date" required class="w-full">
                    </div>
                    <div>
                        <label for="currency" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Para Birimi <span class="text-rose-500">*</span></label>
                        <select id="currency" required class="w-full">
                            <option value="EUR">EUR (€)</option>
                            <option value="USD">USD ($)</option>
                            <option value="TRY">TRY (₺)</option>
                            <option value="GBP">GBP (£)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="total_amount" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Toplam Sipariş Tutarı <span class="text-rose-500">*</span></label>
                        <input type="text" id="total_amount" required placeholder="Örn: 15.000,00" class="w-full text-right font-mono text-white">
                    </div>
                    <div>
                        <label for="advance_payment" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tahsil Edilen Avans</label>
                        <input type="text" id="advance_payment" placeholder="Örn: 3.500,00" class="w-full text-right font-mono text-emerald-400">
                    </div>
                </div>

                <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl flex justify-between items-center">
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Kalan Vadeli Bakiye (Anlık):</span>
                    <span id="live-remaining-balance" class="font-mono font-bold text-lg text-amber-400">0,00</span>
                </div>

                <div class="flex items-center justify-between border-t border-slate-800 pt-5 mt-6">
                    <button type="button" id="btn-delete-order" class="px-4 py-2 bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900/50 hover:border-rose-700 text-rose-400 text-sm font-semibold rounded-lg hidden flex items-center gap-2">
                        <i class="fa-solid fa-trash-can"></i> Siparişi Sil
                    </button>
                    <div class="flex items-center gap-3 ml-auto">
                        <button type="button" id="btn-order-cancel" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-sm font-semibold text-slate-300">İptal</button>
                        <button type="submit" class="px-4 py-2 bg-orange-600 hover:bg-orange-500 text-white rounded-lg text-sm font-semibold shadow-lg shadow-orange-600/20">Siparişi Kaydet</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/src/orders.js"></script>
</body>
</html>
