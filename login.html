<html lang="tr">
<head>

<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- Space Animation Canvas -->

    <!-- Theme Toggle -->
    <div class="fixed top-4 right-4" style="z-index:10;">
        <button id="login-theme-btn" onclick="(function(){var t=localStorage.getItem('ep-theme')||'dark';var n=t==='dark'?'light':'dark';localStorage.setItem('ep-theme',n);document.documentElement.classList.remove('dark','light');document.documentElement.classList.add(n);document.getElementById('login-theme-btn').innerHTML=n==='dark'?'<i class=\'fa-solid fa-sun text-amber-400\'></i>':'<i class=\'fa-solid fa-moon text-indigo-400\'></i>';})()"
            class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-400 hover:text-white transition-all cursor-pointer shadow-lg">
            <i class="fa-solid fa-sun text-amber-400" id="login-theme-icon"></i>
        </button>
    </div>
    <script>
        // İkon başlangıç durumu
        (function(){
            var t = localStorage.getItem('ep-theme') || 'dark';
            var btn = document.getElementById('login-theme-btn');
            if(btn) btn.innerHTML = t === 'dark' 
                ? '<i class="fa-solid fa-sun text-amber-400"></i>'

        })();

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700" style="position:relative;z-index:10;">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-3">

        <form id="authForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">E-posta Adresi</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-2.5 bg-slate-950 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 text-sm"
                    placeholder="ornek@firma.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Şifre</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-2.5 bg-slate-950 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 text-sm"

            <div id="messageArea" class="hidden text-sm p-3 rounded-lg text-center font-medium"></div>
            <button type="submit" id="mainBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-lg text-sm cursor-pointer">
                Giriş Yap
            </button>
        </form>
        <div class="mt-6 text-center text-sm">
            <span class="text-slate-400" id="toggleText">Hesabınız yok mu?</span>
            <button id="toggleBtn" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1 underline cursor-pointer">Kayıt Olun</button>
        </div>
    </div>

    <script>
        const { createClient } = window.supabase;
        const sb = createClient(
            'https://rotquydzejivrhhkjkps.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvdHF1eWR6ZWppdnJoaGtqa3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjI4NzksImV4cCI6MjA5NTE5ODg3OX0.iSnCVTuIObT7G3hWfEyJ-kXEBumRbHSIV7QDN-WWWes',
            { auth: { persistSession: true, storageKey: 'sb-rotquydzejivrhhkjkps-auth-token' } }
        );

        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });

        const authForm      = document.getElementById('authForm');
        const emailInput    = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const mainBtn       = document.getElementById('mainBtn');
        const toggleBtn     = document.getElementById('toggleBtn');
        const toggleText    = document.getElementById('toggleText');
        const messageArea   = document.getElementById('messageArea');
        let isLoginMode     = true;

        function showMessage(text, isSuccess = false) {
            messageArea.innerText = text;
            messageArea.className = `text-sm p-3 rounded-lg text-center font-medium ${isSuccess
                ? 'bg-emerald-950/50 text-emerald-400 border border-emerald-800'
                : 'bg-rose-950/50 text-rose-400 border border-rose-800'}`;
            messageArea.classList.remove('hidden');
        }

        toggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            messageArea.classList.add('hidden');
            mainBtn.innerText    = isLoginMode ? 'Giriş Yap' : 'Yeni Hesap Oluştur';
            toggleText.innerText = isLoginMode ? 'Hesabınız yok mu?' : 'Zaten hesabınız var mı?';
            toggleBtn.innerText  = isLoginMode ? 'Kayıt Olun' : 'Giriş Yapın';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageArea.classList.add('hidden');
            const email    = emailInput.value.trim();
            const password = passwordInput.value;
            mainBtn.disabled = true;

            if (isLoginMode) {
                mainBtn.innerText = 'Giriş Yapılıyor...';
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) {
                    showMessage(error.message, false);
                    mainBtn.disabled  = false;
                    mainBtn.innerText = 'Giriş Yap';
                } else {
                    showMessage('Giriş başarılı!', true);
                    setTimeout(() => window.location.href = 'index.html', 800);
                }
            } else {
                mainBtn.innerText = 'Hesap Oluşturuluyor...';
                const { error } = await sb.auth.signUp({ email, password });
                if (error) {
                    showMessage(error.message, false);
                } else {
                    showMessage('Kayıt başarılı! E-posta adresinizi kontrol edin.', true);
                }
                mainBtn.disabled  = false;
                mainBtn.innerText = 'Yeni Hesap Oluştur';
            }
        });
    <!-- Space Constellation Animation -->
    <!-- V: 1.0.16 -->
    <script>
    (function(){
        const canvas = document.getElementById('ep-bg-canvas');
        const ctx    = canvas.getContext('2d');
        let W, H, mouse = { x: -9999, y: -9999 };

        const NODE_COUNT   = 80;
        const CONNECT_DIST = 130;
        const REPEL_RADIUS = 100;
        const REPEL_FORCE  = 1.4;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function isLight() {
            return document.documentElement.classList.contains('light');
        }

        function getColors() {
            if (isLight()) {
                return {
                    node:   'rgba(99,102,241,',
                    line:   'rgba(99,102,241,',
                    cursor: 'rgba(234,88,12,'
                };
            }
            return {
                node:   'rgba(148,163,184,',
                line:   'rgba(99,102,241,',
                cursor: 'rgba(249,115,22,'
            };
        }

        class Node {
            constructor() { this.init(); }
            init() {
                this.x  = Math.random() * W;
                this.y  = Math.random() * H;
                const spd = 0.12 + Math.random() * 0.22;
                const ang = Math.random() * Math.PI * 2;
                this.vx = Math.cos(ang) * spd;
                this.vy = Math.sin(ang) * spd;
                this.r     = 1.2 + Math.random() * 1.8;
                this.alpha = 0.4 + Math.random() * 0.6;
            }

            update() {
                const dx   = this.x - mouse.x;
                const dy   = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < REPEL_RADIUS && dist > 0) {
                    const force = (1 - dist / REPEL_RADIUS) * REPEL_FORCE;
                    this.vx += (dx / dist) * force * 0.09;
                    this.vy += (dy / dist) * force * 0.09;
                }

                const MAX_SPD = 2.0;
                const BASE_SPD = 0.15;
                const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (spd > MAX_SPD) {
                    this.vx = this.vx / spd * MAX_SPD;
                    this.vy = this.vy / spd * MAX_SPD;
                }
                if (spd > BASE_SPD) {
                    this.vx *= 0.999;
                    this.vy *= 0.999;
                }

                this.vx += (Math.random() - 0.5) * 0.003;
                this.vy += (Math.random() - 0.5) * 0.003;

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -20) this.x = W + 20;
                if (this.x > W+20) this.x = -20;
                if (this.y < -20) this.y = H + 20;
                if (this.y > H+20) this.y = -20;
            }

            draw(colors) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = colors.node + this.alpha + ')';
                ctx.fill();
            }
        }

        const nodes = Array.from({ length: NODE_COUNT }, () => new Node());

        function drawConnections(colors) {
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const a  = nodes[i], b = nodes[j];
                    const dx = a.x - b.x, dy = a.y - b.y;
                    const d  = Math.sqrt(dx * dx + dy * dy);
                    if (d < CONNECT_DIST) {
                        const op = (1 - d / CONNECT_DIST) * 0.4;
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.strokeStyle = colors.line + op + ')';
                        ctx.lineWidth   = 0.7;
                        ctx.stroke();
                    }
                }
            }
        }

        function drawMouseLines(colors) {
            if (mouse.x < 0 || mouse.x > W + 100) return;
            const reach = REPEL_RADIUS * 1.6;
            nodes.forEach(n => {
                const dx = n.x - mouse.x, dy = n.y - mouse.y;
                const d  = Math.sqrt(dx * dx + dy * dy);
                if (d < reach) {
                    const op = (1 - d / reach) * 0.55;
                    ctx.beginPath();
                    ctx.moveTo(mouse.x, mouse.y);
                    ctx.lineTo(n.x, n.y);
                    ctx.strokeStyle = colors.cursor + op + ')';
                    ctx.lineWidth   = 0.6;
                    ctx.stroke();
                }
            });
        }

        function loop() {
            ctx.clearRect(0, 0, W, H);
            const colors = getColors();
            nodes.forEach(n => n.update());
            drawConnections(colors);
            drawMouseLines(colors);
            nodes.forEach(n => n.draw(colors));
            requestAnimationFrame(loop);
        }

        document.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        document.addEventListener('mouseleave', () => {
            mouse.x = -9999;
            mouse.y = -9999;
        });

        loop();
    })();
    </script>
</body>
