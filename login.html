<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script>
        (function(){
            var t = localStorage.getItem('ep-theme') || 'light';
            document.documentElement.classList.add(t === 'dark' ? 'dark' : 'light');
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap — Export Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Light tokens ── */
        :root {
            --bg:          #F6F3EC;
            --surface:     #FFFFFF;
            --border:      #E4DDCE;
            --border-soft: #EFEAE0;
            --ink-1:       #1C1A17;
            --ink-2:       #6B655B;
            --ink-3:       #968B7A;
            --accent:      #2D4A3E;
            --accent-soft: #E8EEEA;
            --bronze:      #B58858;
            --ok:          #3D6E50;
            --danger:      #9F3D3D;
        }

        /* ── Dark tokens ── */
        html.dark {
            --bg:          #1C1A17;
            --surface:     #252320;
            --border:      #3A3630;
            --border-soft: #302D28;
            --ink-1:       #F0EDE6;
            --ink-2:       #A8A097;
            --ink-3:       #6B6458;
            --accent:      #5A8A72;
            --accent-soft: rgba(90,138,114,0.15);
            --bronze:      #C9A06A;
            --ok:          #5A8A72;
            --danger:      #C05A5A;
        }

        /* ── Layout ── */
        html {
            height: 100%;
            -webkit-font-smoothing: antialiased;
        }

        body {
            height: 100%;
            min-height: 100vh;
            font-family: Verdana, Geneva, sans-serif;
            background-color: var(--bg);
            color: var(--ink-1);
            /* Flex ile ortalama — canvas fixed olduğu için body height gerekli */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background-color 0.25s ease, color 0.2s ease;
        }

        /* Canvas arka plan */
        #ep-bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Theme toggle */
        #login-theme-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 20;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--ink-2);
            cursor: pointer;
            transition: background 0.15s, border-color 0.25s, color 0.2s;
        }
        #login-theme-btn:hover { background: var(--accent-soft); }

        /* İçerik sarmalayıcı — z-index ile canvas üstünde */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
        }

        /* Marka alanı */
        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-brand-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            background: var(--ink-1);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            transition: background 0.25s;
        }

        .login-brand h1 {
            font-family: Verdana, Geneva, sans-serif;
            font-size: 32px; font-weight: 500;
            color: var(--ink-1);
            letter-spacing: -0.01em;
            line-height: 1.15;
            margin-bottom: 4px;
            transition: color 0.2s;
        }

        .login-brand p {
            font-size: 13px;
            color: var(--ink-2);
            font-family: Verdana, Geneva, sans-serif;
            transition: color 0.2s;
        }

        /* Kart */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border-soft);
            border-radius: 10px;
            padding: 32px;
            transition: background 0.25s, border-color 0.25s;
        }

        /* Eyebrow */
        .eyebrow {
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.22em; text-transform: uppercase;
            color: var(--bronze);
            margin-bottom: 20px;
            font-family: Verdana, Geneva, sans-serif;
            transition: color 0.2s;
        }

        /* Form */
        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 12px; font-weight: 500;
            color: var(--ink-2);
            margin-bottom: 5px;
            font-family: Verdana, Geneva, sans-serif;
            transition: color 0.2s;
        }

        .form-group input {
            display: block; width: 100%;
            height: 38px; padding: 0 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: Verdana, Geneva, sans-serif;
            font-size: 13px; color: var(--ink-1);
            transition: border-color 0.15s, box-shadow 0.15s, background 0.25s, color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45,74,62,0.10);
        }

        html.dark .form-group input:focus {
            box-shadow: 0 0 0 3px rgba(90,138,114,0.15);
        }

        .form-group input::placeholder { color: var(--ink-3); font-weight: 300; }

        /* Mesaj alanı */
        #messageArea {
            margin-bottom: 12px;
            font-size: 12.5px; padding: 10px 14px;
            border-radius: 6px; text-align: center;
            font-family: Verdana, Geneva, sans-serif;
            display: none;
        }
        #messageArea.ok  {
            display: block;
            background: rgba(61,110,80,0.12);
            color: var(--ok);
            border: 1px solid rgba(61,110,80,0.25);
        }
        #messageArea.err {
            display: block;
            background: rgba(159,61,61,0.10);
            color: var(--danger);
            border: 1px solid rgba(159,61,61,0.20);
        }

        /* Giriş butonu */
        #mainBtn {
            display: block; width: 100%;
            height: 40px; border-radius: 6px;
            background: var(--ink-1);
            color: #F6F3EC;
            border: 1px solid var(--ink-1);
            font-family: Verdana, Geneva, sans-serif;
            font-size: 13px; font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.2s;
            margin-top: 4px;
        }
        #mainBtn:hover:not(:disabled) { background: #000; border-color: #000; }
        html.dark #mainBtn {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        html.dark #mainBtn:hover:not(:disabled) { background: #4a7660; border-color: #4a7660; }
        #mainBtn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Toggle */
        .login-toggle {
            margin-top: 18px; text-align: center;
            font-size: 12.5px; color: var(--ink-3);
            font-family: Verdana, Geneva, sans-serif;
        }

        #toggleBtn {
            background: none; border: none; padding: 0;
            color: var(--accent);
            font-family: Verdana, Geneva, sans-serif;
            font-size: 12.5px; font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.2s;
        }

        /* Footer */
        .login-footer {
            text-align: center; margin-top: 20px;
            font-size: 10px; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--ink-3);
            font-family: Verdana, Geneva, sans-serif;
            transition: color 0.2s;
        }
    </style>
</head>
<body>

    <!-- Constellation Canvas -->
    <canvas id="ep-bg-canvas"></canvas>

    <!-- Theme Toggle -->
    <button id="login-theme-btn" title="Temayı Değiştir">
        <i id="theme-icon" class="fa-solid fa-moon" style="font-size:14px;"></i>
    </button>

    <!-- İçerik -->
    <div class="login-wrap">
        <div class="login-brand">
            <div class="login-brand-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="1.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
            <h1>Export Suite</h1>
            <p>Kurumsal İhracat Yönetim Sistemi</p>
        </div>

        <div class="login-card">
            <div class="eyebrow">Hesabınıza Giriş Yapın</div>
            <form id="authForm">
                <div class="form-group">
                    <label for="email">E-posta Adresi</label>
                    <input type="email" id="email" required
                           placeholder="ornek@firma.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" required
                           placeholder="••••••••" autocomplete="current-password">
                </div>
                <div id="messageArea"></div>
                <button type="submit" id="mainBtn">Giriş Yap</button>
            </form>
            <div class="login-toggle">
                <span id="toggleText">Hesabınız yok mu?</span>
                <button id="toggleBtn">Kayıt Olun</button>
            </div>
        </div>

        <div class="login-footer">Export Suite · İhracat Yönetimi</div>
    </div>

    <!-- Supabase Auth — fonksiyonlar orijinal -->
    <script>
        const { createClient } = window.supabase;
        const sb = createClient(
            'https://rotquydzejivrhhkjkps.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvdHF1eWR6ZWppdnJoaGtqa3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjI4NzksImV4cCI6MjA5NTE5ODg3OX0.iSnCVTuIObT7G3hWfEyJ-kXEBumRbHSIV7QDN-WWWes',
            { auth: { persistSession: true, storageKey: 'sb-rotquydzejivrhhkjkps-auth-token' } }
        );

        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });

        const authForm      = document.getElementById('authForm');
        const emailInput    = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const mainBtn       = document.getElementById('mainBtn');
        const toggleBtn     = document.getElementById('toggleBtn');
        const toggleText    = document.getElementById('toggleText');
        const messageArea   = document.getElementById('messageArea');
        let isLoginMode     = true;

        function showMessage(text, isSuccess) {
            messageArea.textContent = text;
            messageArea.className   = isSuccess ? 'ok' : 'err';
        }

        toggleBtn.addEventListener('click', () => {
            isLoginMode           = !isLoginMode;
            messageArea.className = '';
            messageArea.textContent = '';
            mainBtn.textContent     = isLoginMode ? 'Giriş Yap' : 'Yeni Hesap Oluştur';
            toggleText.textContent  = isLoginMode ? 'Hesabınız yok mu?' : 'Zaten hesabınız var mı?';
            toggleBtn.textContent   = isLoginMode ? 'Kayıt Olun' : 'Giriş Yapın';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageArea.className = '';
            const email    = emailInput.value.trim();
            const password = passwordInput.value;
            mainBtn.disabled = true;

            if (isLoginMode) {
                mainBtn.textContent = 'Giriş Yapılıyor...';
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) {
                    showMessage(error.message, false);
                    mainBtn.disabled    = false;
                    mainBtn.textContent = 'Giriş Yap';
                } else {
                    showMessage('Giriş başarılı!', true);
                    setTimeout(() => window.location.href = 'index.html', 800);
                }
            } else {
                mainBtn.textContent = 'Hesap Oluşturuluyor...';
                const { error } = await sb.auth.signUp({ email, password });
                if (error) {
                    showMessage(error.message, false);
                } else {
                    showMessage('Kayıt başarılı! E-posta adresinizi kontrol edin.', true);
                }
                mainBtn.disabled    = false;
                mainBtn.textContent = 'Yeni Hesap Oluştur';
            }
        });
    </script>

    <!-- Theme Toggle Logic -->
    <script>
        (function () {
            var html = document.documentElement;
            var btn  = document.getElementById('login-theme-btn');
            var icon = document.getElementById('theme-icon');

            function applyTheme(t) {
                html.classList.remove('dark', 'light');
                html.classList.add(t);
                icon.className = (t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon');
                icon.style.fontSize = '14px';
            }

            applyTheme(localStorage.getItem('ep-theme') || 'light');

            btn.addEventListener('click', function () {
                var next = (localStorage.getItem('ep-theme') || 'light') === 'dark' ? 'light' : 'dark';
                localStorage.setItem('ep-theme', next);
                applyTheme(next);
            });
        })();
    </script>

    <!-- Constellation Animation -->
    <script>
    (function () {
        var canvas = document.getElementById('ep-bg-canvas');
        var ctx    = canvas.getContext('2d');
        var W, H;
        var mouse  = { x: -9999, y: -9999 };

        var NODE_COUNT   = 80;
        var CONNECT_DIST = 130;
        var REPEL_RADIUS = 100;
        var REPEL_FORCE  = 1.4;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function isDark() {
            return document.documentElement.classList.contains('dark');
        }

        function getColors() {
            return isDark()
                ? { node: 'rgba(201,160,106,', line: 'rgba(90,138,114,',  cursor: 'rgba(201,160,106,' }
                : { node: 'rgba(45,74,62,',    line: 'rgba(181,136,88,',  cursor: 'rgba(45,74,62,' };
        }

        function makeNode() {
            var ang = Math.random() * Math.PI * 2;
            var spd = 0.12 + Math.random() * 0.22;
            return {
                x: Math.random() * W, y: Math.random() * H,
                vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
                r: 1.2 + Math.random() * 1.8,
                alpha: 0.3 + Math.random() * 0.5
            };
        }

        var nodes = [];
        for (var i = 0; i < NODE_COUNT; i++) nodes.push(makeNode());

        function updateNode(n) {
            var dx = n.x - mouse.x, dy = n.y - mouse.y;
            var d  = Math.sqrt(dx * dx + dy * dy);
            if (d < REPEL_RADIUS && d > 0) {
                var f = (1 - d / REPEL_RADIUS) * REPEL_FORCE;
                n.vx += (dx / d) * f * 0.09;
                n.vy += (dy / d) * f * 0.09;
            }
            var spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
            if (spd > 2.0)  { n.vx = n.vx / spd * 2.0; n.vy = n.vy / spd * 2.0; }
            if (spd > 0.15) { n.vx *= 0.999; n.vy *= 0.999; }
            n.vx += (Math.random() - 0.5) * 0.003;
            n.vy += (Math.random() - 0.5) * 0.003;
            n.x  += n.vx; n.y += n.vy;
            if (n.x < -20) n.x = W + 20; if (n.x > W + 20) n.x = -20;
            if (n.y < -20) n.y = H + 20; if (n.y > H + 20) n.y = -20;
        }

        function loop() {
            ctx.clearRect(0, 0, W, H);
            var c = getColors();
            var i, j, a, b, dx, dy, d;

            for (i = 0; i < nodes.length; i++) updateNode(nodes[i]);

            /* Bağlantı çizgileri */
            for (i = 0; i < nodes.length; i++) {
                for (j = i + 1; j < nodes.length; j++) {
                    a = nodes[i]; b = nodes[j];
                    dx = a.x - b.x; dy = a.y - b.y;
                    d  = Math.sqrt(dx * dx + dy * dy);
                    if (d < CONNECT_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
                        ctx.strokeStyle = c.line + ((1 - d / CONNECT_DIST) * 0.35) + ')';
                        ctx.lineWidth   = 0.6;
                        ctx.stroke();
                    }
                }
            }

            /* Cursor ışınları */
            if (mouse.x > 0 && mouse.x < W + 100) {
                var reach = REPEL_RADIUS * 1.6;
                for (i = 0; i < nodes.length; i++) {
                    var n = nodes[i];
                    dx = n.x - mouse.x; dy = n.y - mouse.y;
                    d  = Math.sqrt(dx * dx + dy * dy);
                    if (d < reach) {
                        ctx.beginPath();
                        ctx.moveTo(mouse.x, mouse.y); ctx.lineTo(n.x, n.y);
                        ctx.strokeStyle = c.cursor + ((1 - d / reach) * 0.5) + ')';
                        ctx.lineWidth   = 0.5;
                        ctx.stroke();
                    }
                }
            }

            /* Node'lar */
            for (i = 0; i < nodes.length; i++) {
                var n = nodes[i];
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                ctx.fillStyle = c.node + n.alpha + ')';
                ctx.fill();
            }

            requestAnimationFrame(loop);
        }

        document.addEventListener('mousemove', function (e) { mouse.x = e.clientX; mouse.y = e.clientY; });
        document.addEventListener('mouseleave', function ()  { mouse.x = -9999; mouse.y = -9999; });

        loop();
    })();
    </script>

</body>
</html>
