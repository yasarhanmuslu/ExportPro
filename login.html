<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Export Manager Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-3">
                <i class="fa-solid fa-earth-americas text-3xl text-orange-500"></i>
            </div>
            <h1 class="text-3xl font-bold text-indigo-400 tracking-tight">Export Manager Pro</h1>
            <p class="text-slate-400 mt-2 text-sm">Kurumsal İhracat Yönetim Sistemi</p>
        </div>

        <form id="authForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">E-posta Adresi</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-2.5 bg-slate-950 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 text-sm"
                    placeholder="ornek@firma.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Şifre</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-2.5 bg-slate-950 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 text-sm"
                    placeholder="••••••••">
            </div>
            <div id="messageArea" class="hidden text-sm p-3 rounded-lg text-center font-medium"></div>
            <button type="submit" id="mainBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-lg text-sm cursor-pointer">
                Giriş Yap
            </button>
        </form>
        <div class="mt-6 text-center text-sm">
            <span class="text-slate-400" id="toggleText">Hesabınız yok mu?</span>
            <button id="toggleBtn" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1 underline cursor-pointer">Kayıt Olun</button>
        </div>
        <!-- DEBUG: Session durumu -->
        <div id="debugInfo" class="mt-4 p-3 bg-slate-900 rounded text-xs text-slate-500 font-mono hidden"></div>
    </div>

    <script>
        const { createClient } = window.supabase;
        const sb = createClient(
            'https://rotquydzejivrhhkjkps.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvdHF1eWR6ZWppdnJoaGtqa3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjI4NzksImV4cCI6MjA5NTE5ODg3OX0.iSnCVTuIObT7G3hWfEyJ-kXEBumRbHSIV7QDN-WWWes'
        );

        // Mevcut session'ı kontrol et ve debug göster
        async function checkAndShowSession() {
            const { data: { session } } = await sb.auth.getSession();
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.classList.remove('hidden');
            
            if (session) {
                // LocalStorage'da hangi key ile kaydedilmiş?
                const lsKeys = Object.keys(localStorage).filter(k => k.includes('supabase') || k.includes('sb-'));
                debugDiv.innerHTML = `
                    ✅ Session VAR: ${session.user.email}<br>
                    🔑 LS Keys: ${lsKeys.join(', ') || 'YOK'}<br>
                    📋 Token: ${session.access_token.slice(0,20)}...
                `;
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                const lsKeys = Object.keys(localStorage).filter(k => k.includes('supabase') || k.includes('sb-'));
                debugDiv.innerHTML = `
                    ❌ Session YOK<br>
                    🔑 LS Keys: ${lsKeys.join(', ') || 'YOK'}
                `;
            }
        }

        checkAndShowSession();

        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const mainBtn = document.getElementById('mainBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleText = document.getElementById('toggleText');
        const messageArea = document.getElementById('messageArea');
        let isLoginMode = true;

        function showMessage(text, isSuccess = false) {
            messageArea.innerText = text;
            messageArea.className = `text-sm p-3 rounded-lg text-center font-medium ${isSuccess
                ? 'bg-emerald-950/50 text-emerald-400 border border-emerald-800'
                : 'bg-rose-950/50 text-rose-400 border border-rose-800'}`;
            messageArea.classList.remove('hidden');
        }

        toggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            messageArea.classList.add('hidden');
            if (isLoginMode) {
                mainBtn.innerText = 'Giriş Yap';
                toggleText.innerText = 'Hesabınız yok mu?';
                toggleBtn.innerText = 'Kayıt Olun';
            } else {
                mainBtn.innerText = 'Yeni Hesap Oluştur';
                toggleText.innerText = 'Zaten hesabınız var mı?';
                toggleBtn.innerText = 'Giriş Yapın';
            }
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageArea.classList.add('hidden');
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            mainBtn.disabled = true;
            mainBtn.innerText = 'Giriş Yapılıyor...';

            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            
            if (error) {
                showMessage(error.message, false);
                mainBtn.disabled = false;
                mainBtn.innerText = 'Giriş Yap';
            } else {
                // Giriş başarılı - debug bilgisi göster
                const lsKeys = Object.keys(localStorage).filter(k => k.includes('supabase') || k.includes('sb-'));
                const debugDiv = document.getElementById('debugInfo');
                debugDiv.classList.remove('hidden');
                debugDiv.innerHTML = `
                    ✅ Login OK: ${data.user.email}<br>
                    🔑 LS Keys: ${lsKeys.join(', ') || 'YOK'}<br>
                    🚀 Yönlendiriliyor...
                `;
                showMessage('Giriş başarılı!', true);
                setTimeout(() => window.location.href = 'index.html', 2000);
            }
        });

        toggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
        });
    </script>
</body>
</html>
